<!doctype html>
<html lang="en" class="scroll-smooth scroll-pt-16">
  <head>
    <meta charset="UTF-8" />
    <title>De Martino | Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./src/output.css" />
  </head>

  <body>
    <header class="bg-primary-700 fixed top-0 left-0 w-full shadow p-6 z-50">
      <nav class="w-full flex items-center">
        <!-- Logo -->
        <a href="#hero" class="text-white text-4xl font-bold whitespace-nowrap">
          De Martino
        </a>

        <!-- Navigation Links -->
        <ul
          class="hidden md:flex gap-8 w-full justify-end mx-6"
          style="list-style: none"
        >
          <li>
            <a
              href="#about"
              class="hover:underline text-white"
              data-i18n="nav.about"
            ></a>
          </li>
          <li>
            <a
              href="#parcours"
              class="hover:underline text-white"
              data-i18n="nav.parcours"
            ></a>
          </li>
          <li>
            <a
              href="#projects"
              class="hover:underline text-white"
              data-i18n="nav.projects"
            ></a>
          </li>
          <li>
            <a
              href="#contact"
              class="hover:underline text-white"
              data-i18n="nav.contact"
            ></a>
          </li>
        </ul>

        <!-- Download Button -->
        <a
          id="cv"
          href="./src/content/resume-de-martino-giada.pdf"
          download
          data-i18n="nav.resume"
          class="w-45 h-12 flex items-center justify-center"
        >
          <icon name="download" class="ml-2 text-white"></icon>
        </a>

        <!-- Language Selector -->
        <select
          id="language-selector"
          onchange="changeLanguage()"
          class="bg-black border border-white text-white rounded mx-6 text-sm p-1"
        >
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="it">Italiano</option>
        </select>
      </nav>
    </header>

    <!-- Main Content -->
    <main id="content"></main>

    <!-- Footer -->
    <footer class="border-t mt-auto">
      <div class="max-w-6xl mx-auto px-6 py-6 text-center text-sm">
        <p data-i18n="footer.footerText"></p>
      </div>
    </footer>

    <script src="src/script.js"></script>
  </body>
</html>
