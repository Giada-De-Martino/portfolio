<div
  id="contact"
  class="flex items-center justify-center w-screen min-h-screen p-6"
>
  <div class="rounded-xl p-8 shadow-xl w-full max-w-2xl">
    <!-- Form Title -->
    <h2 class="text-3xl font-bold mb-6" data-i18n="contact.contactTitle"></h2>

    <!-- Form -->
    <form class="flex flex-col gap-4">
      <input
        type="text"
        data-i18n-placeholder="contact.namePlaceholder"
        required
        class="border border-primary-300 rounded-md p-3 focus:outline-none focus:ring-2 focus:border-primary-500"
      />

      <input
        type="email"
        data-i18n-placeholder="contact.emailPlaceholder"
        required
        class="border border-primary-300 rounded-md p-3 focus:outline-none focus:ring-2 focus:border-primary-500"
      />

      <textarea
        data-i18n-placeholder="contact.messagePlaceholder"
        required
        class="border border-primary-300 rounded-md p-3 h-32 resize-none focus:outline-none focus:ring-2 focus:border-primary-500"
      ></textarea>

      <button
        type="submit"
        class="bg-primary-600 text-white font-semibold rounded-md p-3 hover:bg-primary-700 transition-colors"
        data-i18n="contact.sendButton"
      ></button>
    </form>
  </div>
</div>
