<div id="hero" class="w-screen h-screen flex items-center justify-center pt-20">
  <div class="flex flex-col md:flex-row items-center gap-12 max-w-5xl w-full">
    <!-- Left: Image -->
    <div class="relative flex-1 max-w-md mx-auto md:mx-0">
      <div
        class="absolute inset-0 rounded-4xl bg-linear-to-br from-primary-500/20 to-transparent blur-2xl"
      ></div>
      <img
        src="./src/images/profile.jpeg"
        alt="Profile Picture"
        class="relative w-72 h-72 md:w-96 md:h-96 object-cover rounded-4xl shadow-2xl"
      />
    </div>

    <!-- Right: Text -->
    <div class="flex-1 flex flex-col justify-center gap-6">
      <div class="space-y-4">
        <p
          class="text-sm uppercase tracking-[0.35em] text-primary-400"
          data-i18n="hero.heroIntro"
        ></p>
        <p class="text-base text-primary-200" data-i18n="hero.heroTitle"></p>
        <h1
          class="text-4xl md:text-6xl font-extrabold leading-tight"
          data-i18n="hero.heroName"
        ></h1>
        <h1
          class="text-4xl md:text-6xl font-extrabold leading-tight"
          data-i18n="hero.firstName"
        ></h1>
        <h1
          class="text-4xl md:text-6xl font-extrabold leading-tight"
          data-i18n="hero.lastName"
        ></h1>
        <p
          class="text-xl md:text-2xl font-semibold text-white/90"
          data-i18n="hero.heroSubtitle"
        ></p>
        <p class="max-w-xl text-gray-300" data-i18n="hero.heroDescription"></p>
      </div>

      <div class="flex flex-wrap gap-4">
        <a
          href="#projects"
          class="inline-flex items-center justify-center rounded-full bg-primary-600 px-8 py-3 text-sm font-semibold text-white transition hover:bg-primary-700"
          data-i18n="hero.ctaProjects"
        ></a>
        <a
          href="#contact"
          class="inline-flex items-center justify-center rounded-full border border-white/20 bg-white/5 px-8 py-3 text-sm font-semibold text-white transition hover:bg-white/10"
          data-i18n="hero.ctaContact"
        ></a>
      </div>
    </div>
  </div>
</div>
